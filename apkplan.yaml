 tampilan nya perlu sesuai dengan kaidah desain, kreatif dan sesui dengan role dari user yang login. Nama APLIKASInya adalah "SC NIAS", dari project ini, buatkan aplikasi Android (APK) yang memiliki fitur lengkap sesuai versi web ini, dengan mengikuti seluruh tahapan SDLC secara menyeluruh. Mulai dari: (1) analisis struktur database, route API, controller, middleware, dan seluruh endpoint yang ada di project Laravel untuk memahami arsitektur dan alur bisnis, (2) buat perencanaan pengembangan aplikasi Android yang mencakup arsitektur MVVM, daftar layar, navigasi, state management, dan integrasi API lengkap, (3) langsung implementasikan seluruh kode aplikasi Android dari awal termasuk splash screen, login, register, dashboard, seluruh fitur CRUD yang ada di web, dan fitur-fitur khusus sesuai modul yang sudah berjalan di Laravel, (4) integrasikan seluruh komunikasi API dengan retrofit, tangani autentikasi JWT/sanctum secara penuh termasuk token refresh, error handling, dan loading state, (5) gunakan ikon dan aset yang sesuai secara otomatis—generate dari deskripsi fitur jika perlu menggunakan vector drawable atau icon pack standar material design, (6) pastikan setiap fitur sudah diuji melalui unit test dan instrumentation test, (7) setup environment configuration untuk base URL production (https://studycenter.overcomer.my.id/) dan staging, (8) hasil akhir file apk release yang sudah langsung di-build menjadi APK release production-ready. Kerjakan semua secara berurutan dalam satu kali eksekusi prompt ini, tanpa menunggu konfirmasi lagi dari saya, dan pastikan hasilnya sudah tested, aman, optimal, dan siap digunakan di production.