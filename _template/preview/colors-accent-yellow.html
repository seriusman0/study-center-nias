<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:transparent;font-family:var(--font-sans);color:var(--sc-ink-900);-webkit-font-smoothing:antialiased}
  .frame{width:700px;box-sizing:border-box;padding:20px 24px;background:var(--sc-bg);min-height:160px}
  .row{display:flex;gap:10px}
  .grid{display:grid;gap:10px}
  .sw{flex:1;min-height:64px;border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;justify-content:flex-end;font-family:var(--font-mono);font-size:11px;line-height:1.25;box-shadow:var(--sh-inset)}
  .sw .n{font-family:var(--font-sans);font-weight:700;font-size:12px;margin-bottom:2px}
  .sw.dark{color:#fff}
  .sw.light{color:var(--sc-ink-900)}
  .hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
  .hdr .ttl{font-weight:700;font-size:13px}
  .hdr .sub{font-size:11px;color:var(--sc-ink-500);font-family:var(--font-mono)}
</style>
</head><body><div class="frame">
<div class="hdr"><span class="ttl">Accent · Yellow</span><span class="sub">--sc-yellow-*</span></div>
<div class="row">
  <div class="sw dark" style="background:#97810f"><span class="n">700</span><span>#97810f</span></div>
  <div class="sw dark" style="background:#c8a91a"><span class="n">600</span><span>#c8a91a</span></div>
  <div class="sw light" style="background:#e0c020"><span class="n">500</span><span>#e0c020</span></div>
  <div class="sw light" style="background:#f0db77"><span class="n">300</span><span>#f0db77</span></div>
  <div class="sw light" style="background:#fbf3c5"><span class="n">100</span><span>#fbf3c5</span></div>
</div></div></body></html>
