<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:transparent;font-family:var(--font-sans);color:var(--sc-ink-900);-webkit-font-smoothing:antialiased}
  .frame{width:700px;box-sizing:border-box;padding:20px 24px;background:var(--sc-bg);min-height:180px}
  .row{display:flex;gap:10px}
  .grid{display:grid;gap:10px}
  .sw{flex:1;min-height:64px;border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;justify-content:flex-end;font-family:var(--font-mono);font-size:11px;line-height:1.25;box-shadow:var(--sh-inset)}
  .sw .n{font-family:var(--font-sans);font-weight:700;font-size:12px;margin-bottom:2px}
  .sw.dark{color:#fff}
  .sw.light{color:var(--sc-ink-900)}
  .hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
  .hdr .ttl{font-weight:700;font-size:13px}
  .hdr .sub{font-size:11px;color:var(--sc-ink-500);font-family:var(--font-mono)}
</style>
</head><body><div class="frame">
<div class="hdr"><span class="ttl">Role badges</span><span class="sub">--sc-role-*</span></div>
<div class="row" style="align-items:stretch">
  <div class="sw dark" style="background:#0e8e6d;min-height:80px;justify-content:space-between">
    <span class="n" style="color:#fff;opacity:.7">student</span>
    <div><div style="font-family:var(--font-sans);font-weight:700">Siswa</div><div>#0e8e6d</div></div>
  </div>
  <div class="sw dark" style="background:#d8731a;min-height:80px;justify-content:space-between">
    <span class="n" style="color:#fff;opacity:.7">mentor</span>
    <div><div style="font-family:var(--font-sans);font-weight:700">Mentor</div><div>#d8731a</div></div>
  </div>
  <div class="sw dark" style="background:#003a2c;min-height:80px;justify-content:space-between">
    <span class="n" style="color:#fff;opacity:.7">admin</span>
    <div><div style="font-family:var(--font-sans);font-weight:700">Admin</div><div>#003a2c</div></div>
  </div>
  <div class="sw dark" style="background:#c8a91a;min-height:80px;justify-content:space-between">
    <span class="n" style="color:#fff;opacity:.7">fulltimer</span>
    <div><div style="font-family:var(--font-sans);font-weight:700">Fulltimer</div><div>#c8a91a</div></div>
  </div>
</div></div></body></html>
