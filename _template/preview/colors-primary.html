<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:transparent;font-family:var(--font-sans);color:var(--sc-ink-900);-webkit-font-smoothing:antialiased}
  .frame{width:700px;box-sizing:border-box;padding:20px 24px;background:var(--sc-bg);min-height:190px}
  .row{display:flex;gap:10px}
  .grid{display:grid;gap:10px}
  .sw{flex:1;min-height:64px;border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;justify-content:flex-end;font-family:var(--font-mono);font-size:11px;line-height:1.25;box-shadow:var(--sh-inset)}
  .sw .n{font-family:var(--font-sans);font-weight:700;font-size:12px;margin-bottom:2px}
  .sw.dark{color:#fff}
  .sw.light{color:var(--sc-ink-900)}
  .hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
  .hdr .ttl{font-weight:700;font-size:13px}
  .hdr .sub{font-size:11px;color:var(--sc-ink-500);font-family:var(--font-mono)}
</style>
</head><body><div class="frame">
<div class="hdr"><span class="ttl">Primary · Teal-Green</span><span class="sub">--sc-teal-*</span></div>
<div class="row">
  <div class="sw dark" style="background:#003a2c"><span class="n">900</span><span>#003a2c</span></div>
  <div class="sw dark" style="background:#005a44"><span class="n">800</span><span>#005a44</span></div>
  <div class="sw dark" style="background:#007a5c"><span class="n">700</span><span>#007a5c</span></div>
  <div class="sw dark" style="background:#0e8e6d"><span class="n">600</span><span>#0e8e6d</span></div>
  <div class="sw dark" style="background:#2ba888"><span class="n">500</span><span>#2ba888</span></div>
  <div class="sw light" style="background:#9dd9c5"><span class="n">300</span><span>#9dd9c5</span></div>
  <div class="sw light" style="background:#e1f3ec"><span class="n">100</span><span>#e1f3ec</span></div>
  <div class="sw light" style="background:#f1f9f5"><span class="n">50</span><span>#f1f9f5</span></div>
</div></div></body></html>
