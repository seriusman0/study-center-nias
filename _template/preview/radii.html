<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:transparent;font-family:var(--font-sans);color:var(--sc-ink-900);-webkit-font-smoothing:antialiased}
  .frame{width:700px;box-sizing:border-box;padding:20px 24px;background:var(--sc-bg);min-height:220px}
  .hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
  .hdr .ttl{font-weight:700;font-size:13px}
  .hdr .sub{font-size:11px;color:var(--sc-ink-500);font-family:var(--font-mono)}
</style>
</head><body><div class="frame">
<div class="hdr"><span class="ttl">Corner radii</span><span class="sub">--r-xs … --r-pill</span></div>
<div style="display:flex;gap:14px;flex-wrap:wrap">

  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:90px">
    <div style="width:72px;height:72px;background:#fff;border:1px solid var(--sc-line);border-radius:4px;box-shadow:var(--sh-1)"></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--sc-ink-900);font-weight:600">--r-xs</div>
    <div style="font-size:11px;color:var(--sc-ink-500);text-align:center;line-height:1.3">Inputs, badges, kartu nama</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:90px">
    <div style="width:72px;height:72px;background:#fff;border:1px solid var(--sc-line);border-radius:8px;box-shadow:var(--sh-1)"></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--sc-ink-900);font-weight:600">--r-sm</div>
    <div style="font-size:11px;color:var(--sc-ink-500);text-align:center;line-height:1.3">Small chips, swatches</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:90px">
    <div style="width:72px;height:72px;background:#fff;border:1px solid var(--sc-line);border-radius:12px;box-shadow:var(--sh-1)"></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--sc-ink-900);font-weight:600">--r-md</div>
    <div style="font-size:11px;color:var(--sc-ink-500);text-align:center;line-height:1.3">Default card, button</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:90px">
    <div style="width:72px;height:72px;background:#fff;border:1px solid var(--sc-line);border-radius:16px;box-shadow:var(--sh-1)"></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--sc-ink-900);font-weight:600">--r-lg</div>
    <div style="font-size:11px;color:var(--sc-ink-500);text-align:center;line-height:1.3">Large card, sheet</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:90px">
    <div style="width:72px;height:72px;background:#fff;border:1px solid var(--sc-line);border-radius:24px;box-shadow:var(--sh-1)"></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--sc-ink-900);font-weight:600">--r-xl</div>
    <div style="font-size:11px;color:var(--sc-ink-500);text-align:center;line-height:1.3">Hero, feature card</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:90px">
    <div style="width:72px;height:72px;background:#fff;border:1px solid var(--sc-line);border-radius:999px;box-shadow:var(--sh-1)"></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--sc-ink-900);font-weight:600">--r-pill</div>
    <div style="font-size:11px;color:var(--sc-ink-500);text-align:center;line-height:1.3">Pill button, role chip</div>
  </div>
</div></div></body></html>
