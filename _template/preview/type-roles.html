<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:transparent;font-family:var(--font-sans);color:var(--sc-ink-900);-webkit-font-smoothing:antialiased}
  .frame{width:700px;box-sizing:border-box;padding:20px 24px;background:var(--sc-bg);min-height:300px}
  .hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
  .hdr .ttl{font-weight:700;font-size:13px}
  .hdr .sub{font-size:11px;color:var(--sc-ink-500);font-family:var(--font-mono)}
  .row{display:flex;align-items:baseline;gap:18px;margin-bottom:12px}
  .row .meta{font-family:var(--font-mono);font-size:11px;color:var(--sc-ink-500);min-width:120px;flex-shrink:0;align-self:flex-end;line-height:1.4}
  .row .specimen{flex:1;text-wrap:pretty}
</style>
</head><body><div class="frame">
<div class="hdr"><span class="ttl">Type roles in context</span><span class="sub">eyebrow · display · quote · link</span></div>
<div class="row"><div class="meta">.sc-eyebrow</div><div class="specimen sc-eyebrow">CABANG · GUNUNGSITOLI</div></div>
<div class="row" style="align-items:flex-start"><div class="meta">.sc-display</div><div class="specimen" style="font-family:var(--font-display);font-size:42px;line-height:1.05;color:var(--sc-ink-900)">Selamat datang, Seri.</div></div>
<div class="row" style="align-items:flex-start"><div class="meta">.sc-quote</div><div class="specimen sc-quote">"Setiap orang harus cepat untuk mendengar, tetapi lambat untuk berkata-kata."<br><span style="display:block;margin-top:6px;font-family:var(--font-sans);font-size:13px;color:var(--sc-ink-500);font-weight:600">— Yakobus 1:19</span></div></div>
<div class="row"><div class="meta">Link inline</div><div class="specimen sc-body">Sudah punya akun? <a style="color:var(--sc-teal-700);text-decoration:underline;font-weight:600">Masuk</a> dengan email atau Google.</div></div>
</div></body></html>
