<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:transparent;font-family:var(--font-sans);color:var(--sc-ink-900);-webkit-font-smoothing:antialiased}
  .frame{width:700px;box-sizing:border-box;padding:20px 24px;background:var(--sc-bg);min-height:220px}
  .hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
  .hdr .ttl{font-weight:700;font-size:13px}
  .hdr .sub{font-size:11px;color:var(--sc-ink-500);font-family:var(--font-mono)}
</style>
</head><body><div class="frame">
<div class="hdr"><span class="ttl">Shadow system</span><span class="sub">warm ink, never blue</span></div>
<div style="display:flex;gap:20px;padding:18px 4px 22px">

  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1">
    <div style="width:108px;height:84px;background:#fff;border-radius:12px;box-shadow:var(--sh-1)"></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--sc-ink-900);font-weight:600">--sh-1</div>
    <div style="font-size:11px;color:var(--sc-ink-500)">hairline rest</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1">
    <div style="width:108px;height:84px;background:#fff;border-radius:12px;box-shadow:var(--sh-2)"></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--sc-ink-900);font-weight:600">--sh-2</div>
    <div style="font-size:11px;color:var(--sc-ink-500)">default card</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1">
    <div style="width:108px;height:84px;background:#fff;border-radius:12px;box-shadow:var(--sh-3)"></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--sc-ink-900);font-weight:600">--sh-3</div>
    <div style="font-size:11px;color:var(--sc-ink-500)">hover / pop</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1">
    <div style="width:108px;height:84px;background:#fff;border-radius:12px;box-shadow:var(--sh-4)"></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--sc-ink-900);font-weight:600">--sh-4</div>
    <div style="font-size:11px;color:var(--sc-ink-500)">modal / popover</div>
  </div>
</div></div></body></html>
