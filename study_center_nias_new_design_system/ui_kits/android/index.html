<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Study Center Nias · Android UI Kit (all roles)</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #0d1612; min-height: 100vh; }
    body { font-family: var(--font-sans); color: var(--sc-ink-900); -webkit-font-smoothing: antialiased; }

    /* Stage */
    .stage {
      min-height: 100vh; padding: 32px 32px 80px;
      background:
        radial-gradient(ellipse at 50% 0%, #1a2d27 0%, #0d1612 65%);
    }
    .titlebar {
      display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
      max-width: 1400px; margin-left: auto; margin-right: auto;
    }
    .titlebar img { width: 36px; height: 36px; object-fit: contain; filter: brightness(0) invert(1); }
    .titlebar h1 {
      font-family: var(--font-display); color: #fff; font-size: 24px;
      margin: 0; line-height: 1;
    }
    .titlebar .sub { font-size: 12px; color: rgba(255,255,255,0.6); font-family: var(--font-mono); letter-spacing: 0.08em; margin-top: 4px; }

    /* Role tabs */
    .role-tabs {
      display: flex; gap: 6px; max-width: 1400px; margin: 0 auto 28px;
      flex-wrap: wrap;
    }
    .role-tab {
      padding: 10px 16px; border-radius: 999px; cursor: pointer;
      font-family: var(--font-sans); font-size: 13px; font-weight: 700;
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.10);
      display: inline-flex; align-items: center; gap: 8px;
      transition: all 160ms cubic-bezier(0.22,0.61,0.36,1);
    }
    .role-tab:hover { background: rgba(255,255,255,0.14); color: #fff; }
    .role-tab.active { color: #fff; }
    .role-tab .dot { width: 8px; height: 8px; border-radius: 50%; }
    .role-tab.role-admin.active     { background: var(--sc-teal-900);   border-color: var(--sc-teal-700); }
    .role-tab.role-mentor.active    { background: var(--sc-orange-600); border-color: var(--sc-orange-500); }
    .role-tab.role-fulltimer.active { background: var(--sc-yellow-600); border-color: var(--sc-yellow-500); color: var(--sc-teal-900); }
    .role-tab.role-student.active   { background: var(--sc-teal-600);   border-color: var(--sc-teal-500); }
    .role-tab.role-guest.active     { background: rgba(255,255,255,0.30); border-color: rgba(255,255,255,0.40); }

    /* Section under tabs explaining the role */
    .role-intro {
      max-width: 1400px; margin: 0 auto 24px;
      padding: 16px 20px; border-radius: 14px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      color: #e6efe9;
    }
    .role-intro h2 { font-family: var(--font-display); font-size: 22px; margin: 0; color: #fff; }
    .role-intro p { margin: 6px 0 0; font-size: 13px; line-height: 1.5; color: rgba(255,255,255,0.75); max-width: 720px; }
    .role-intro .perms { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
    .role-intro .perm {
      font-family: var(--font-mono); font-size: 10px; padding: 3px 7px;
      border-radius: 4px; background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.85); border: 1px solid rgba(255,255,255,0.08);
    }

    /* Phone row */
    .phones {
      display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; max-width: 1400px; margin: 0 auto;
    }
    .phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .phone-label { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.08em; text-transform: uppercase; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Tokens.jsx"></script>
  <script type="text/babel" src="Atoms.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="Common.jsx"></script>
  <script type="text/babel" src="ScreensCommon.jsx"></script>
  <script type="text/babel" src="ScreensMentor.jsx"></script>
  <script type="text/babel" src="ScreensAdmin.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    window.addEventListener('error', e => {
      document.body.innerHTML = '<pre style="color:#fff;padding:20px;font-family:monospace;font-size:11px;white-space:pre-wrap">'+(e.error?.stack || e.message)+'</pre>';
    });
    const ROLES = {
      admin: {
        label: 'Admin',
        intro: 'Administrator dengan kendali penuh — kelola pengguna, role, permission, cabang, blog, jurnal harian seluruh siswa, presensi mentor, master kelas, dan generator name tag.',
        perms: ['manage_users', 'manage_roles', 'manage_cabangs', 'manage_blogs', 'create_blog', 'view_blogs', 'approve_payment'],
        screens: [
          { name: 'Dashboard', cmp: AdminDashboard },
          { name: 'Pengguna', cmp: AdminUsers },
          { name: 'Role & Permission', cmp: AdminRoles },
          { name: 'Jurnal · Hafal Ayat', cmp: AdminJurnalSetup },
          { name: 'Cabang', cmp: AdminCabang },
          { name: 'Name Tag Generator', cmp: AdminNameTag },
        ],
      },
      mentor: {
        label: 'Mentor',
        intro: 'Mentor cabang — catat presensi mengajar sendiri, kelola jurnal siswa (read-only di porsi alkitab, ayat, jadwal), lihat daftar siswa di cabang. Tidak bisa mengubah role atau cabang.',
        perms: ['create_blog', 'view_blogs', 'create_schedule'],
        screens: [
          { name: 'Beranda Mentor', cmp: MentorHome },
          { name: 'Presensi Saya', cmp: MentorPresensi },
          { name: 'Panel Mentor', cmp: MentorPanel },
        ],
      },
      fulltimer: {
        label: 'Full-timer',
        intro: 'Staf full-timer yayasan — moderator blog dengan hak mengelola semua tulisan (publish, edit, hapus). Tidak ada akses ke admin panel atau presensi.',
        perms: ['manage_blogs', 'create_blog', 'view_blogs'],
        screens: [
          { name: 'Beranda · Moderasi Blog', cmp: FulltimerHome },
          { name: 'Editor Blog', cmp: FulltimerEditor },
        ],
      },
      student: {
        label: 'Siswa',
        intro: 'Siswa Study Center — isi jurnal harian (pembacaan Alkitab, hafal ayat, jadwal kehidupan), tulis blog komunitas, cetak kartu nama & CV pribadi.',
        perms: ['create_blog', 'view_blogs'],
        screens: [
          { name: 'Beranda Siswa', cmp: StudentHome },
          { name: 'Jurnal Harian', cmp: StudentJurnal },
          { name: 'Profil & Cetak', cmp: StudentProfile },
        ],
      },
      guest: {
        label: 'Tamu publik',
        intro: 'Pengunjung yang belum masuk — bisa melihat halaman publik (beranda, blog, cabang) tetapi harus daftar atau masuk untuk berkomentar / mengisi jurnal.',
        perms: ['view_blogs'],
        screens: [
          { name: 'Beranda Tamu', cmp: GuestHome },
          { name: 'Blog Publik', cmp: GuestBlog },
        ],
      },
    };
    const ROLE_KEYS = ['admin', 'mentor', 'fulltimer', 'student', 'guest'];
    const ROLE_DOT = { admin: T.teal900, mentor: T.orange500, fulltimer: T.yellow500, student: T.teal600, guest: 'rgba(255,255,255,0.5)' };

    function App() {
      const [role, setRole] = React.useState('admin');
      const r = ROLES[role];
      return (
        <div className="stage">
          <div className="titlebar">
            <img src="../../assets/logo.png" alt="" />
            <div>
              <h1>Study Center Nias \u2014 mobile UI kit</h1>
              <div className="sub">ROLE-BY-ROLE · MIRRORS THE WEB APP</div>
            </div>
          </div>

          <div className="role-tabs">
            {ROLE_KEYS.map(k => (
              <div key={k}
                className={`role-tab role-${k}${k === role ? ' active' : ''}`}
                onClick={() => setRole(k)}>
                <span className="dot" style={{ background: ROLE_DOT[k] }} />
                {ROLES[k].label}
              </div>
            ))}
          </div>

          <div className="role-intro">
            <h2>{r.label}</h2>
            <p>{r.intro}</p>
            <div className="perms">
              {r.perms.map(p => <span key={p} className="perm">{p}</span>)}
            </div>
          </div>

          <div className="phones">
            {r.screens.map((s, i) => {
              const C = s.cmp;
              return (
                <div className="phone-wrap" key={i}>
                  <AndroidDevice width={340} height={720}>
                    <C />
                  </AndroidDevice>
                  <div className="phone-label">{s.name}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
