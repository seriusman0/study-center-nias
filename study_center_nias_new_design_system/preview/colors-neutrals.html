<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:transparent;font-family:var(--font-sans);color:var(--sc-ink-900);-webkit-font-smoothing:antialiased}
  .frame{width:700px;box-sizing:border-box;padding:20px 24px;background:var(--sc-bg);min-height:220px}
  .row{display:flex;gap:10px}
  .grid{display:grid;gap:10px}
  .sw{flex:1;min-height:64px;border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;justify-content:flex-end;font-family:var(--font-mono);font-size:11px;line-height:1.25;box-shadow:var(--sh-inset)}
  .sw .n{font-family:var(--font-sans);font-weight:700;font-size:12px;margin-bottom:2px}
  .sw.dark{color:#fff}
  .sw.light{color:var(--sc-ink-900)}
  .hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
  .hdr .ttl{font-weight:700;font-size:13px}
  .hdr .sub{font-size:11px;color:var(--sc-ink-500);font-family:var(--font-mono)}
</style>
</head><body><div class="frame">
<div class="hdr"><span class="ttl">Neutrals · Warm, cream-leaning</span><span class="sub">--sc-ink-* / --sc-bg / --sc-paper</span></div>
<div class="row">
  <div class="sw dark" style="background:#15201c"><span class="n">ink-900</span><span>#15201c</span></div>
  <div class="sw dark" style="background:#324840"><span class="n">ink-700</span><span>#324840</span></div>
  <div class="sw dark" style="background:#61756c"><span class="n">ink-500</span><span>#61756c</span></div>
  <div class="sw light" style="background:#a3b3ac"><span class="n">ink-300</span><span>#a3b3ac</span></div>
  <div class="sw light" style="background:#d9e2dc"><span class="n">line</span><span>#d9e2dc</span></div>
  <div class="sw light" style="background:#eef2ee"><span class="n">line-soft</span><span>#eef2ee</span></div>
</div>
<div class="row" style="margin-top:10px">
  <div class="sw light" style="background:#ffffff"><span class="n">surface</span><span>#ffffff</span></div>
  <div class="sw light" style="background:#fbfaf6"><span class="n">bg-alt</span><span>#fbfaf6</span></div>
  <div class="sw light" style="background:#f7f6f1"><span class="n">bg (page)</span><span>#f7f6f1</span></div>
  <div class="sw light" style="background:#f5efe2"><span class="n">paper</span><span>#f5efe2</span></div>
</div></div></body></html>
